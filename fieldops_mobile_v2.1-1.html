<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FieldOps Mobile v2.1</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --mono:'Share Tech Mono',monospace;
  --head:'Rajdhani',sans-serif;
  --body:'Barlow Condensed',sans-serif;
  --accent:#00c8ff;--gold:#c9a84c;--green:#3ddc84;
  --red:#ef4444;--orange:#f97316;--purple:#a855f7;
  --bg:#06090f;--bg2:#0a0f1a;--bg3:#0d1525;
  --panel:#111827;--border:rgba(0,200,255,.10);--border2:rgba(0,200,255,.18);
  --hi:rgba(220,240,255,.96);--mid:rgba(160,200,230,.72);--lo:rgba(100,150,190,.50);
  --gabby:#f472b6;--chuck:#00c8ff;--gary:#fb923c;--claude:#a78bfa;
  --l1:#38bdf8;--l2:#4ade80;--l3:#fb923c;--l4:#e879f9;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--hi);font-family:var(--body);font-size:14px;}
input,select,textarea,button{font-family:var(--body);font-size:14px;-webkit-appearance:none;}
::placeholder{color:var(--lo);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,200,255,.2);border-radius:2px;}

/* ═══ LAYOUT ════════════════════════════════════════════ */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ═══ HEADER ════════════════════════════════════════════ */
.hdr{flex-shrink:0;background:linear-gradient(180deg,#030710 0%,#060c18 100%);border-bottom:1px solid rgba(0,200,255,.11);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hdr-brand{flex-shrink:0;}
.hdr-title{font-family:var(--head);font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--hi);line-height:1;}
.hdr-title span{color:var(--gold);}
.hdr-sub{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lo);margin-top:1px;}
.hdr-mid{display:flex;flex-direction:column;align-items:center;flex:1;}
.hdr-time{font-family:var(--head);font-size:17px;font-weight:700;letter-spacing:1.5px;color:var(--hi);line-height:1;}
.hdr-date{font-family:var(--mono);font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--lo);}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.wx-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid rgba(0,200,255,.11);border-radius:6px;padding:4px 8px;}
.wx-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);flex-shrink:0;}
.wx-temp{font-family:var(--head);font-size:15px;font-weight:600;color:var(--hi);line-height:1;}
.wx-desc{font-family:var(--mono);font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--mid);}
.status-pip{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);}
.pip{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pip 2.4s ease-in-out infinite;}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.25}}

/* ═══ FOCUS STRIP ══════════════════════════════════════ */
.focus-strip{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(239,68,68,.04);border-bottom:1px solid rgba(239,68,68,.12);}
.focus-label{font-family:var(--mono);font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:var(--red);white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.fpip{width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 4px var(--red);animation:pip 1.8s ease-in-out infinite;}
.focus-box{flex:1;min-width:0;cursor:pointer;}
.focus-empty{font-family:var(--mono);font-size:8px;color:var(--lo);letter-spacing:.8px;text-transform:uppercase;}
.focus-title{font-family:var(--head);font-size:13px;font-weight:600;color:var(--hi);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.focus-clear{font-family:var(--mono);font-size:8px;color:var(--lo);background:none;border:1px solid var(--border);border-radius:3px;padding:2px 6px;cursor:pointer;flex-shrink:0;}

/* ═══ NAV BAR ═══════════════════════════════════════════ */
.nav{flex-shrink:0;display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.nav::-webkit-scrollbar{display:none;}
.nav-tab{flex:1;min-width:60px;font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--lo);padding:10px 6px 9px;cursor:pointer;border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;background:none;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .18s;}
.nav-tab .tab-icon{font-size:14px;line-height:1;}
.nav-tab:hover{color:var(--mid);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-badge{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:rgba(0,200,255,.15);color:var(--accent);font-size:8px;margin-left:2px;}

/* ═══ CONTENT AREA ══════════════════════════════════════ */
.content{flex:1;overflow:hidden;position:relative;}
.section{display:none;height:100%;overflow-y:auto;padding:14px;}
.section.active{display:block;}

/* ═══ SHARED COMPONENTS ════════════════════════════════ */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
.section-title{font-family:var(--head);font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--hi);}
.section-sub{font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--lo);margin-top:1px;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;}
.btn{font-family:var(--head);font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:6px 12px;border-radius:5px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,#1a6fd4,#0d4fa0);color:white;}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#a0822e);color:#0a0e14;}
.btn-green{background:linear-gradient(135deg,#16a34a,#14532d);color:white;}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--mid);border:1px solid var(--border2);}
.btn-danger{background:linear-gradient(135deg,#ef4444,#b91c1c);color:white;}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:white;}
.btn-sm{padding:4px 9px;font-size:10px;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.panel-hdr{padding:8px 12px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(0,200,255,.06) 0%,transparent 100%);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);}
.panel-body{padding:12px;}
.field{margin-bottom:10px;}
.lbl{font-family:var(--mono);font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:var(--lo);margin-bottom:4px;display:block;}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:5px;padding:7px 10px;color:var(--hi);outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--accent);}
select.inp{cursor:pointer;}
select.inp option{background:#0a0f1a;}
textarea.inp{resize:vertical;min-height:70px;line-height:1.6;}
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;border:1px solid;}
.badge-gabby{color:var(--gabby);border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.08);}
.badge-chuck{color:var(--chuck);border-color:rgba(0,200,255,.3);background:rgba(0,200,255,.08);}
.badge-gary{color:var(--gary);border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.08);}
.badge-claude{color:var(--claude);border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.08);}
.badge-queued{color:#94a3b8;border-color:rgba(148,163,184,.3);background:rgba(148,163,184,.08);}
.badge-dispatched{color:var(--gold);border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.08);}
.badge-waiting{color:var(--orange);border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.08);}
.badge-complete{color:var(--green);border-color:rgba(61,220,132,.3);background:rgba(61,220,132,.08);}
.badge-carry{color:var(--purple);border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.08);}
.badge-high{color:var(--red);border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08);}
.badge-critical{color:#ff2020;border-color:rgba(255,32,32,.4);background:rgba(255,32,32,.1);}
.badge-normal{color:var(--mid);border-color:var(--border2);}
.badge-low{color:var(--lo);border-color:var(--border);}
.badge-l1{color:#38bdf8;border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.08);}
.badge-l2{color:#4ade80;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.08);}
.badge-l3{color:#fb923c;border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.08);}
.badge-l4{color:#e879f9;border-color:rgba(232,121,249,.3);background:rgba(232,121,249,.08);}
.badge-todo{color:#94a3b8;border-color:rgba(148,163,184,.3);background:rgba(148,163,184,.08);}
.badge-inprogress{color:var(--gold);border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.08);}
.badge-done{color:var(--green);border-color:rgba(61,220,132,.3);background:rgba(61,220,132,.08);}
.empty-q{text-align:center;padding:32px 16px;font-family:var(--mono);font-size:10px;color:var(--lo);letter-spacing:1.2px;line-height:1.8;}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{font-family:var(--mono);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;padding:4px 9px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--lo);cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,200,255,.06);}

/* ═══ MISSION CARDS ════════════════════════════════════ */
.m-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden;}
.m-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.m-card.agent-gabby::before{background:var(--gabby);}
.m-card.agent-chuck::before{background:var(--chuck);}
.m-card.agent-gary::before{background:var(--gary);}
.m-card.agent-claude::before{background:var(--claude);}
.m-title{font-family:var(--head);font-size:14px;font-weight:600;color:var(--hi);margin-bottom:5px;line-height:1.3;}
.m-meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.m-obj{font-size:11px;color:var(--mid);line-height:1.5;margin-bottom:7px;}
.m-actions{display:flex;gap:4px;flex-wrap:wrap;}

/* ═══ TASK CARDS ════════════════════════════════════════ */
.task-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:11px;margin-bottom:7px;display:flex;align-items:flex-start;gap:9px;}
.task-cb{width:17px;height:17px;border:1px solid var(--border2);border-radius:3px;cursor:pointer;flex-shrink:0;appearance:none;background:transparent;position:relative;transition:all .2s;margin-top:1px;}
.task-cb:checked{background:var(--green);border-color:var(--green);}
.task-cb:checked::after{content:'✓';position:absolute;top:-2px;left:2px;font-size:11px;color:#0a0e14;}
.task-body{flex:1;min-width:0;}
.task-title{font-family:var(--head);font-size:13px;font-weight:600;color:var(--hi);line-height:1.3;}
.task-title.done-text{text-decoration:line-through;color:var(--lo);}
.task-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.task-actions{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}

/* ═══ ADD TASK FORM ═════════════════════════════════════ */
.add-task-form{background:rgba(0,0,0,.3);border:1px dashed var(--border2);border-radius:7px;padding:12px;margin-bottom:11px;}

/* ═══ AGENDA ════════════════════════════════════════════ */
.agenda-loading{text-align:center;padding:32px 16px;font-family:var(--mono);font-size:10px;color:var(--lo);letter-spacing:1.2px;}
.agenda-day{margin-bottom:16px;}
.agenda-day-hdr{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
.agenda-day-date{color:var(--lo);font-size:8px;}
.agenda-event{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:5px;margin-bottom:4px;background:rgba(255,255,255,.02);border:1px solid transparent;transition:all .18s;}
.agenda-time{font-family:var(--mono);font-size:9px;color:var(--lo);white-space:nowrap;flex-shrink:0;padding-top:1px;min-width:55px;}
.agenda-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.agenda-info{flex:1;min-width:0;}
.agenda-name{font-family:var(--body);font-size:12px;font-weight:500;color:var(--hi);}
.agenda-desc{font-family:var(--mono);font-size:8px;color:var(--lo);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.agenda-loc{font-family:var(--mono);font-size:8px;color:rgba(0,200,255,.5);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.agenda-allday{font-family:var(--mono);font-size:8px;color:var(--lo);font-style:italic;}
.agenda-refresh{font-family:var(--mono);font-size:8px;color:var(--lo);text-align:right;padding:4px 0;letter-spacing:.8px;}

/* ═══ COMPOSER ══════════════════════════════════════════ */
.prompt-preview{width:100%;min-height:180px;background:rgba(0,0,0,.4);border:1px solid var(--border2);border-radius:5px;padding:11px;font-family:var(--mono);font-size:10px;color:var(--mid);line-height:1.8;white-space:pre-wrap;word-break:break-word;overflow-y:auto;max-height:220px;}
.prompt-preview.has-content{color:var(--hi);}
.prompt-ph{color:var(--lo);font-style:italic;}

/* ═══ PASTE PARSER ══════════════════════════════════════ */
.parse-hint{font-family:var(--mono);font-size:8px;color:var(--lo);letter-spacing:.7px;line-height:1.7;margin-bottom:9px;padding:7px 9px;background:rgba(0,200,255,.04);border-radius:4px;border-left:2px solid rgba(0,200,255,.2);}
.parse-result{margin-top:9px;padding:9px 11px;background:rgba(61,220,132,.06);border:1px solid rgba(61,220,132,.2);border-radius:5px;font-family:var(--mono);font-size:8px;color:var(--green);letter-spacing:.8px;line-height:1.8;}
.parse-result.warn{background:rgba(249,115,22,.06);border-color:rgba(249,115,22,.2);color:var(--orange);}

/* ═══ DEBRIEF ═══════════════════════════════════════════ */
.db-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden;}
.db-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);}
.db-title{font-family:var(--head);font-size:13px;font-weight:600;color:var(--hi);}
.db-meta{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0;}
.db-result{font-size:11px;color:var(--mid);line-height:1.6;margin-top:6px;padding:8px;background:rgba(0,0,0,.3);border-radius:4px;border-left:2px solid var(--green);}

/* ═══ MODALS ════════════════════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px 12px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px;box-shadow:0 -8px 40px rgba(0,0,0,.8);}
.modal-title{font-family:var(--head);font-size:16px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-close{cursor:pointer;color:var(--lo);font-size:18px;background:none;border:none;}

/* ═══ TOAST ═════════════════════════════════════════════ */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:11px;padding:9px 16px;border-radius:6px;box-shadow:0 4px 20px rgba(0,200,255,.2);opacity:0;transition:all .25s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ END DAY / ARCHIVE ════════════════════════════════ */
.endday-strip{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:rgba(201,168,76,.04);border-bottom:1px solid rgba(201,168,76,.12);}
.endday-label{font-family:var(--mono);font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:5px;}
.endday-label::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 5px var(--gold);}
.endday-btn{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:5px;border:1px solid rgba(201,168,76,.4);background:rgba(201,168,76,.10);color:var(--gold);cursor:pointer;transition:all .18s;}
.endday-btn:hover{background:rgba(201,168,76,.20);border-color:var(--gold);}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;align-items:center;justify-content:center;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--bg2);border:1px solid rgba(201,168,76,.35);border-radius:12px;padding:24px;max-width:360px;width:100%;box-shadow:0 0 60px rgba(201,168,76,.12);}
.confirm-title{font-family:var(--head);font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.confirm-body{font-family:var(--mono);font-size:10px;color:var(--mid);line-height:1.8;margin-bottom:8px;letter-spacing:.5px;}
.confirm-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;}
.confirm-stat{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:10px 12px;text-align:center;}
.confirm-stat-num{font-family:var(--head);font-size:22px;font-weight:700;color:var(--hi);line-height:1;}
.confirm-stat-lbl{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lo);margin-top:2px;}
.confirm-btn-row{display:flex;gap:8px;margin-top:16px;}
.confirm-btn-row .btn{flex:1;justify-content:center;}
.archive-card{background:var(--bg3);border:1px solid rgba(201,168,76,.15);border-radius:7px;padding:11px;margin-bottom:7px;position:relative;overflow:hidden;opacity:.75;}
.archive-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);}
.archive-title{font-family:var(--head);font-size:13px;font-weight:600;color:var(--mid);line-height:1.3;}
.archive-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.archive-empty{text-align:center;padding:24px 16px;font-family:var(--mono);font-size:10px;color:var(--lo);letter-spacing:1px;line-height:1.8;}
.archive-section-hdr{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding:5px 0;border-bottom:1px solid rgba(201,168,76,.15);margin-bottom:8px;margin-top:4px;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px;position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.stat-box.s-high::before{background:var(--red);}
.stat-box.s-assigned::before{background:var(--gold);}
.stat-box.s-complete::before{background:var(--green);}
.stat-num{font-family:var(--head);font-size:24px;font-weight:700;line-height:1;}
.stat-box.s-high .stat-num{color:var(--red);}
.stat-box.s-assigned .stat-num{color:var(--gold);}
.stat-box.s-complete .stat-num{color:var(--green);}
.stat-lbl{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lo);margin-top:1px;}
</style>
</head>
<body>

</body>
